<app-navbar />

<div class="min-h-screen bg-gray-50 dark:bg-[#110b1a] transition-colors duration-300">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <div class="bg-white dark:bg-[#1a1025] border border-blue-100 dark:border-orange-500/20 rounded-2xl shadow-lg dark:shadow-orange-500/5 p-10 text-center transition-all duration-300">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl mb-6 shadow-lg"
        [class]="role() === 'admin'
          ? 'bg-blue-500 dark:bg-orange-500'
          : role() === 'guest'
            ? 'bg-orange-400 dark:bg-yellow-600'
            : 'bg-gray-400 dark:bg-gray-600'"
      >
        @if (role() === 'admin') {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
          </svg>
        } @else if (role() === 'guest') {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        }
      </div>

      <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-4">
        Nice, you're {{ role() === 'admin' ? 'an' : 'a' }}
        <span class="text-blue-500 dark:text-orange-400">{{ role() }}</span>
      </h1>
      <p class="text-lg text-gray-500 dark:text-gray-400">
        Very impressive!
      </p>

      @if (user(); as u) {
        <div class="mt-8 pt-6 border-t border-blue-100 dark:border-orange-500/20">
          <p class="text-sm text-gray-400 dark:text-gray-500">
            Logged in as <span class="font-semibold text-gray-600 dark:text-gray-300">{{ u.email }}</span>
          </p>
        </div>
      }
    </div>
  </div>
</div>
