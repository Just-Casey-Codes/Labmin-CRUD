<nav class="bg-white dark:bg-[#1a1025] border-b border-blue-100 dark:border-orange-500/20 shadow-sm transition-colors duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-blue-500 dark:bg-orange-500 flex items-center justify-center shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        </div>
        <span class="text-lg font-bold text-gray-900 dark:text-white">Labmin</span>
      </div>

      <div class="flex items-center gap-1">
        <a
          routerLink="/tasks"
          routerLinkActive="bg-blue-50 dark:bg-orange-500/10 text-blue-600 dark:text-orange-400"
          id="nav-tasks"
          class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-orange-500/10 hover:text-blue-600 dark:hover:text-orange-400 transition-all duration-200"
        >
          Tasks
        </a>
        <a
          routerLink="/users"
          routerLinkActive="bg-blue-50 dark:bg-orange-500/10 text-blue-600 dark:text-orange-400"
          id="nav-users"
          class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-orange-500/10 hover:text-blue-600 dark:hover:text-orange-400 transition-all duration-200"
        >
          Users
        </a>
        <a
          routerLink="/role"
          routerLinkActive="bg-blue-50 dark:bg-orange-500/10 text-blue-600 dark:text-orange-400"
          id="nav-role"
          class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-orange-500/10 hover:text-blue-600 dark:hover:text-orange-400 transition-all duration-200"
        >
          Role
        </a>
      </div>

      <div class="flex items-center gap-3">
        @if (authService.user(); as user) {
          <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-lg bg-blue-50 dark:bg-orange-500/10 border border-blue-100 dark:border-orange-500/20">
            <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold bg-blue-500 dark:bg-orange-500 text-white uppercase">
              {{ user.email.charAt(0) }}
            </div>
            <span class="text-sm font-medium text-gray-700 dark:text-gray-300">{{ user.email }}</span>
            <span class="text-xs px-1.5 py-0.5 rounded-md font-semibold"
              [class]="user.role === 'admin'
                ? 'bg-blue-500 dark:bg-orange-500 text-white'
                : 'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300'"
            >
              {{ user.role }}
            </span>
          </div>
        }

        <button
          (click)="themeService.toggle()"
          id="nav-theme-toggle"
          class="p-2 rounded-lg border border-blue-100 dark:border-orange-500/20 hover:bg-blue-50 dark:hover:bg-[#251538] transition-all duration-200 group"
        >
          @if (themeService.isDark()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange-400 group-hover:text-orange-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600 group-hover:text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          }
        </button>

        <button
          (click)="logout()"
          id="nav-logout"
          class="px-4 py-2 rounded-lg text-sm font-medium text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition-all duration-200"
        >
          Logout
        </button>
      </div>
    </div>
  </div>
</nav>
